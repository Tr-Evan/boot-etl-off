# =============================================================================
#  etl-off — Optimized configuration
# =============================================================================

spring.application.name=etl-off

# -----------------------------------------------------------------------------
#  Project Loom — Virtual Threads
#  Enables virtual threads for the Tomcat request workers AND for the Spring
#  managed task executors. The ETL uses a dedicated virtual-thread executor
#  (see ExecutorConfig) but this flag makes the whole app Loom-friendly.
# -----------------------------------------------------------------------------
spring.threads.virtual.enabled=true

# -----------------------------------------------------------------------------
#  Datasource — H2 (in-memory, high throughput)
#  H2 supports SEQUENCE generators, which is what unlocks JDBC batch inserts
#  (IDENTITY columns silently disable Hibernate batching).
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:offdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# HikariCP — enough connections so many virtual threads can flush concurrently.
# A virtual thread still pins a real JDBC connection while a statement runs, so
# the pool size is the true write-concurrency ceiling.
spring.datasource.hikari.maximum-pool-size=32
spring.datasource.hikari.minimum-idle=8
spring.datasource.hikari.pool-name=etl-off-pool
spring.datasource.hikari.auto-commit=false

# H2 web console (http://localhost:8080/h2-console) — handy to inspect results.
spring.h2.console.enabled=true

# -----------------------------------------------------------------------------
#  Datasource — PostgreSQL (uncomment this block + the pom dependency to use it)
#  `reWriteBatchedInserts=true` is the PostgreSQL equivalent of batch rewriting
#  and is essential to actually get multi-row INSERTs on the wire.
# -----------------------------------------------------------------------------
# spring.datasource.url=jdbc:postgresql://localhost:5432/offdb?reWriteBatchedInserts=true
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=off
# spring.datasource.password=off
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# -----------------------------------------------------------------------------
#  JPA / Hibernate — batching
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# --- The batching trio ---
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Batch the many-to-many join-table inserts too.
spring.jpa.properties.hibernate.jdbc.fetch_size=200

# Turn on to measure batch effectiveness during the benchmark, then turn off.
spring.jpa.properties.hibernate.generate_statistics=false

# Keep SQL logging OFF during ETL — logging 13k+ INSERTs destroys throughput.
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# -----------------------------------------------------------------------------
#  ETL settings
# -----------------------------------------------------------------------------
# Path to the source file, resolved against the working directory.
etl.csv-path=open-food-facts.csv
# Rows per transactional chunk dispatched to a virtual thread (product phase).
etl.chunk-size=250
# References persisted per transactional chunk (reference phase, now parallelized).
etl.ref-chunk-size=500
# Max chunks writing concurrently. Kept <= the Hikari pool size so virtual threads
# never wait on the connection pool. Tune against your CPU/DB.
etl.max-concurrency=16
# Disable FK checking during the parallel load to avoid H2 lock-contention deadlocks
# on the shared many-to-many reference rows. Integrity is guaranteed by the cache.
etl.disable-referential-integrity-during-load=true
# Run the ingestion automatically on startup.
etl.run-on-startup=true

# -----------------------------------------------------------------------------
#  Web
# -----------------------------------------------------------------------------
server.port=8080

# -----------------------------------------------------------------------------
#  Observabilité (bonus) — Actuator + Prometheus
#  Métriques : http://localhost:8080/actuator/metrics
#  Prometheus : http://localhost:8080/actuator/prometheus
#  Métriques ETL custom : etl.last.duration, etl.last.products, etl.runs.total
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=etl-off
management.prometheus.metrics.export.enabled=true
